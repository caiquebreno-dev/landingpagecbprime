<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CB Prime Auto | Links</title>
  
  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@200;300;400;600&display=swap" rel="stylesheet">
  
  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background com Imagem e Overlay -->
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>
  
  <!-- Partículas -->
  <canvas id="particles-canvas"></canvas>

  <main class="container">
    <header class="header reveal" style="--delay: 0s">
      <!-- Logo principal + boneco lado a lado -->
      <div class="logo-duo">
        <img src="boneco-sem-fundo.png" alt="CB Prime Auto Mascote" class="logo-boneco">
        <div class="logo-separator"></div>
        <img src="logo-sem-fundo.png" alt="CB Prime Auto Logo" class="logo-main">
      </div>
      <h1 class="title">CB Prime Auto</h1>
      <p class="subtitle">Estética Automotiva de Nível Premium</p>
      <div class="navy-divider"></div>
    </header>

    <div class="links-container">
      <a href="https://wa.me/5585998587467" target="_blank" class="link-card reveal" style="--delay: 0.1s">
        <div class="link-icon"><i class="fa-brands fa-whatsapp"></i></div>
        <span class="link-text">Agendar no WhatsApp</span>
      </a>

      <a href="https://www.instagram.com/cbprimeauto" target="_blank" class="link-card reveal" style="--delay: 0.2s">
        <div class="link-icon"><i class="fa-brands fa-instagram"></i></div>
        <span class="link-text">Siga nosso Instagram</span>
      </a>

      <a href="https://www.tiktok.com/@cb.prime.auto" target="_blank" class="link-card reveal" style="--delay: 0.3s">
        <div class="link-icon"><i class="fa-brands fa-tiktok"></i></div>
        <span class="link-text">Veja nosso TikTok</span>
      </a>

      <a href="https://maps.google.com/maps?q=R.%20Raimundo%20Craveiro,%203532%20-%20Lu%C3%ADs%20Alves%20de%20Freitas,%20Limoeiro%20do%20Norte%20-%20CE" target="_blank" class="link-card reveal" style="--delay: 0.4s">
        <div class="link-icon"><i class="fa-solid fa-location-dot"></i></div>
        <span class="link-text">Nossa Localização</span>
      </a>

      <a href="https://cbprimeauto.vercel.app/" target="_blank" class="link-card reveal" style="--delay: 0.5s">
        <div class="link-icon"><i class="fa-solid fa-globe"></i></div>
        <span class="link-text">Acessar Site Oficial</span>
      </a>
    </div>

    <footer class="footer reveal" style="--delay: 0.6s">
      <p>© 2026 CB Prime Auto Estética Automotiva</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
